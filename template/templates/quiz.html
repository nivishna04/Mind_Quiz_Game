<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
</head>
<body style="font-family:Arial;">

    <h2>Answer the questions:</h2>

    <form method="post">
        {% for q in questions %}
            <h3>{{ loop.index }}. {{ q.q }}</h3>

            {% for opt in q.options %}
                <input type="radio" name="{{ loop.parent.index0 }}" value="{{ opt }}" required>
                {{ opt }} <br>
            {% endfor %}

            <br>
        {% endfor %}

        <button type="submit">Submit</button>
    </form>

</body>
</html>
